<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A responsive Trello-style project management board."
    />
    <title>Orbit Board | Product Launch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="board-header">
        <div class="brand-row">
          <a class="brand" href="#board" aria-label="Orbit Board home">
            <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
            <span>orbit<span>board</span></span>
          </a>
          <div class="project-crumb">
            <span>Projects</span>
            <span class="crumb-arrow" aria-hidden="true">/</span>
            <strong>Website Redesign</strong>
          </div>
          <button class="header-avatar" type="button" aria-label="Open profile">GP</button>
        </div>

        <div class="workspace-row">
          <div class="project-title">
            <div>
              <p class="eyebrow">Active project</p>
              <h1>Website Redesign</h1>
            </div>
            <span class="project-status"><i></i>On track</span>
          </div>

          <div class="header-actions">
            <label class="search-control">
              <span class="search-icon" aria-hidden="true"></span>
              <input id="taskSearch" type="search" placeholder="Search tasks" />
              <kbd>/</kbd>
            </label>
            <button class="icon-button more-button" type="button" aria-label="More project options">...</button>
            <button class="add-task-button" id="openTaskModal" type="button">
              <span aria-hidden="true">+</span> Add task
            </button>
          </div>
        </div>

        <div class="board-controls">
          <nav class="view-tabs" aria-label="Project views">
            <button class="view-tab active" type="button">Board</button>
            <button class="view-tab" type="button">Timeline</button>
            <button class="view-tab" type="button">Calendar</button>
          </nav>
          <div class="filter-controls">
            <label class="select-control">
              <span>Assignee</span>
              <select id="assigneeFilter" aria-label="Filter by assignee">
                <option value="all">Everyone</option>
              </select>
            </label>
            <label class="select-control">
              <span>Priority</span>
              <select id="priorityFilter" aria-label="Filter by priority">
                <option value="all">All priorities</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </label>
            <label class="select-control">
              <span>Due date</span>
              <select id="dueFilter" aria-label="Filter by due date">
                <option value="all">Any time</option>
                <option value="overdue">Overdue</option>
                <option value="approaching">Approaching</option>
                <option value="upcoming">Far away</option>
              </select>
            </label>
            <button class="clear-filters" id="clearFilters" type="button">Clear</button>
          </div>
        </div>
      </header>

      <section class="board-layout">
        <aside class="sidebar" aria-label="Project details">
          <section class="sidebar-section project-nav">
            <p class="section-kicker">Workspace</p>
            <a class="sidebar-link active" href="#board"><span class="link-icon grid-icon" aria-hidden="true"></span>Project board</a>
            <a class="sidebar-link" href="#activity"><span class="link-icon pulse-icon" aria-hidden="true"></span>Activity</a>
            <a class="sidebar-link" href="#team"><span class="link-icon people-icon" aria-hidden="true"></span>Team members</a>
          </section>

          <section class="sidebar-section" id="team">
            <div class="section-heading">
              <p class="section-kicker">Team</p>
              <button class="plain-icon-button" type="button" aria-label="Add team member">+</button>
            </div>
            <div class="team-list" id="teamList"></div>
          </section>

          <section class="sidebar-section activity-summary">
            <p class="section-kicker">Project pulse</p>
            <div class="pulse-value"><strong id="completedCount">0</strong><span>tasks completed</span></div>
            <div class="pulse-track"><span id="progressBar"></span></div>
            <p id="progressText">0% of the work is complete</p>
          </section>
        </aside>

        <section class="board-content" id="board" aria-label="Website Redesign task board">
          <div class="board-intro">
            <div>
              <p class="section-kicker">July sprint</p>
              <h2>Delivery board</h2>
            </div>
            <p class="result-count" id="resultCount" aria-live="polite"></p>
          </div>
          <div class="board-scroll">
            <div class="board-columns" id="boardColumns"></div>
          </div>
        </section>

        <aside class="activity-panel" id="activity" aria-label="Recent project activity">
          <div class="activity-heading">
            <div>
              <p class="section-kicker">Live feed</p>
              <h2>Activity</h2>
            </div>
            <button class="plain-text-button" id="clearActivity" type="button">Clear</button>
          </div>
          <ol class="activity-list" id="activityList"></ol>
        </aside>
      </section>
    </main>

    <dialog class="task-dialog" id="taskDialog" aria-labelledby="dialogTitle">
      <form id="taskForm" method="dialog">
        <div class="dialog-heading">
          <div>
            <p class="section-kicker">New work item</p>
            <h2 id="dialogTitle">Create task</h2>
          </div>
          <button class="icon-button close-button" id="closeTaskModal" type="button" aria-label="Close task form">x</button>
        </div>
        <div class="form-grid">
          <label class="form-field form-field-wide">
            <span>Task title</span>
            <input id="taskTitle" name="title" required maxlength="70" placeholder="What needs to be done?" />
          </label>
          <label class="form-field form-field-wide">
            <span>Short description</span>
            <textarea id="taskDescription" name="description" rows="3" maxlength="180" placeholder="Add the important context"></textarea>
          </label>
          <label class="form-field">
            <span>Assignee</span>
            <select id="taskAssignee" name="assignee" required></select>
          </label>
          <label class="form-field">
            <span>Due date</span>
            <input id="taskDueDate" name="dueDate" type="date" required />
          </label>
          <label class="form-field">
            <span>Priority</span>
            <select id="taskPriority" name="priority">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </label>
          <label class="form-field">
            <span>Status</span>
            <select id="taskStatus" name="status"></select>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="secondary-button" id="cancelTask" type="button">Cancel</button>
          <button class="add-task-button" type="submit"><span aria-hidden="true">+</span>Create task</button>
        </div>
      </form>
    </dialog>

    <template id="taskCardTemplate">
      <article class="task-card" draggable="true">
        <div class="card-topline">
          <span class="priority-badge"></span>
          <span class="card-status"></span>
          <button class="card-menu" type="button" aria-label="Task options">...</button>
        </div>
        <h3 class="task-card-title"></h3>
        <p class="task-card-description"></p>
        <div class="task-card-meta">
          <div class="assignee-wrap">
            <span class="member-avatar card-avatar"></span>
            <span class="assignee-name"></span>
          </div>
          <span class="due-date"></span>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
